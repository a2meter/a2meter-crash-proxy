name = "a2meter-crash-proxy"
main = "worker.js"
compatibility_date = "2025-01-15"

# Non-secret vars. Override with `wrangler secret put GITHUB_TOKEN`.
[vars]
REPO_OWNER  = "a2meter"
REPO_NAME   = "Aion2Meter"
CRASH_LABEL = "crash"

# Optional: per-IP rate limiting. Create with:
#   wrangler kv:namespace create RATE_KV
# then paste the returned id below and uncomment.
#
# [[kv_namespaces]]
# binding = "RATE_KV"
# id      = "<paste-id-here>"
